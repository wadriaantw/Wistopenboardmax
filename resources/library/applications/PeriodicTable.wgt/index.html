<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Periodic Table</title>
<style>
  :root {
    --gap: 2px;
    --cell-border: rgba(0,0,0,0.25);
    --text: #111;
    --bg: #fafafa;
    --panel-bg: #ffffff;
    --panel-border: #bbb;
    --accent: #2a82da;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: "Segoe UI", Arial, sans-serif;
    overflow: auto;
  }
  #app { padding: 8px; }
  header {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    margin-bottom: 8px;
  }
  h1 { font-size: 16px; margin: 0; font-weight: 600; }
  .controls { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .controls label { font-size: 12px; color: #555; }
  select, input[type=text] {
    font-size: 12px; padding: 3px 6px;
    border: 1px solid #999; border-radius: 3px;
    background: white; color: var(--text);
  }
  input[type=text] { width: 140px; }
  button {
    font-size: 12px; padding: 3px 8px;
    border: 1px solid #999; border-radius: 3px;
    background: white; color: var(--text); cursor: pointer;
  }
  button:hover { background: #eef; }

  #table {
    display: grid;
    grid-template-columns: repeat(18, minmax(36px, 1fr));
    grid-auto-rows: minmax(44px, auto);
    gap: var(--gap);
  }
  .el {
    border: 1px solid var(--cell-border);
    padding: 2px 3px;
    cursor: pointer;
    user-select: none;
    display: flex; flex-direction: column; justify-content: space-between;
    line-height: 1.05;
    min-width: 0;
    transition: transform 80ms ease, outline-color 80ms ease, opacity 100ms ease;
    position: relative;
  }
  .el:hover {
    outline: 2px solid var(--accent);
    transform: scale(1.08);
    z-index: 5;
  }
  .el.selected {
    outline: 3px solid #d33;
    z-index: 4;
  }
  .el.dim { opacity: 0.18; }
  .el.row-hi, .el.col-hi {
    outline: 2px solid rgba(42,130,218,0.55);
  }
  .el .num { font-size: 9px; opacity: 0.75; }
  .el .sym { font-size: 16px; font-weight: 700; text-align: center; }
  .el .name { font-size: 8px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .el .mass { font-size: 8px; text-align: center; opacity: 0.7; }

  /* Category palette (mode = category) */
  [data-cat="alkali"]      { background: #ff8a8a; }
  [data-cat="alkaline"]    { background: #ffc28a; }
  [data-cat="transition"]  { background: #ffe066; }
  [data-cat="post"]        { background: #c4e07a; }
  [data-cat="metalloid"]   { background: #8ad6c2; }
  [data-cat="nonmetal"]    { background: #8acaff; }
  [data-cat="halogen"]     { background: #c8a3ff; }
  [data-cat="noble"]       { background: #ff96d6; }
  [data-cat="lanthanide"]  { background: #ffb3c1; }
  [data-cat="actinide"]    { background: #ffd1a3; }
  [data-cat="unknown"]     { background: #d0d0d0; }

  /* Phase mode overrides */
  body[data-mode="phase"] [data-phase="solid"]  { background: #cfd8dc; }
  body[data-mode="phase"] [data-phase="liquid"] { background: #80d8ff; }
  body[data-mode="phase"] [data-phase="gas"]    { background: #ffe082; }
  body[data-mode="phase"] [data-phase="unknown"]{ background: #eee; }

  /* Heatmap modes use inline styles via JS */

  /* Lanthanide/Actinide markers */
  .marker {
    border: 1px dashed #999;
    background: #f0f0f0;
    font-size: 10px;
    align-items: center; justify-content: center; display: flex;
    cursor: default;
  }
  .marker:hover { outline: none; transform: none; }

  #panels { display: flex; gap: 10px; margin-top: 10px; align-items: flex-start; flex-wrap: wrap; }
  #info {
    flex: 1 1 320px;
    min-width: 280px;
    border: 1px solid var(--panel-border);
    background: var(--panel-bg);
    padding: 10px 12px;
    font-size: 12px;
  }
  #info .head {
    display: flex; align-items: baseline; gap: 8px;
    border-bottom: 1px solid #ddd; padding-bottom: 6px; margin-bottom: 6px;
  }
  #info .big-sym { font-size: 28px; font-weight: 700; }
  #info .big-name { font-size: 16px; font-weight: 600; }
  #info .big-z { font-size: 12px; color: #666; margin-left: auto; }
  #info dl { display: grid; grid-template-columns: max-content 1fr; gap: 2px 12px; margin: 0; }
  #info dt { color: #555; }
  #info dd { margin: 0; }

  #legend {
    flex: 0 1 360px;
    border: 1px solid var(--panel-border);
    background: var(--panel-bg);
    padding: 8px 10px;
    font-size: 11px;
  }
  #legend h3 { font-size: 12px; margin: 0 0 6px 0; }
  .lg-row { display: flex; flex-wrap: wrap; gap: 4px 10px; }
  .lg { display: inline-flex; align-items: center; gap: 4px; cursor: pointer; }
  .lg .sw {
    width: 14px; height: 14px;
    border: 1px solid #888; display: inline-block;
  }
  .lg.off { opacity: 0.4; }

  .heat-bar {
    margin-top: 8px;
    display: flex; align-items: center; gap: 6px; font-size: 10px;
  }
  .heat-grad {
    flex: 1; height: 10px;
    background: linear-gradient(to right, #2962ff, #00bfa5, #ffd600, #ff6d00, #d50000);
    border: 1px solid #888;
  }
</style>
</head>
<body data-mode="category">
<div id="app">
  <header>
    <h1>Periodic Table of the Elements</h1>
    <div class="controls">
      <label>Color by:
        <select id="mode">
          <option value="category">Category</option>
          <option value="phase">State at 25 °C</option>
          <option value="electroneg">Electronegativity</option>
          <option value="melt">Melting point</option>
          <option value="boil">Boiling point</option>
        </select>
      </label>
      <label>Search:
        <input id="search" type="text" placeholder="name, symbol, or Z" autocomplete="off">
      </label>
      <button id="clear">Clear</button>
    </div>
  </header>

  <div id="table"></div>

  <div id="panels">
    <div id="info"></div>
    <div id="legend"></div>
  </div>
</div>

const CAT_LABEL = {
  alkali: "Alkali metal",
  alkaline: "Alkaline earth metal",
  transition: "Transition metal",
  post: "Post-transition metal",
  metalloid: "Metalloid",
  nonmetal: "Reactive nonmetal",
  halogen: "Halogen",
  noble: "Noble gas",
  lanthanide: "Lanthanide",
  actinide: "Actinide",
  unknown: "Unknown / predicted"
};

// Build a map by Z
const byZ = {};
E.forEach(e => byZ[e[0]] = e);

const tableEl = document.getElementById("table");
const infoEl  = document.getElementById("info");
const legendEl = document.getElementById("legend");
const modeEl  = document.getElementById("mode");
const searchEl = document.getElementById("search");
const clearBtn = document.getElementById("clear");

let selected = null;     // current selected Z
let activeCat = null;    // legend filter (category mode only)

// Build cells
const cellMap = {};
function makeCell(e) {
  const div = document.createElement("div");
  div.className = "el";
  div.dataset.z = e[0];
  div.dataset.cat = e[6];
  div.dataset.phase = e[7];
  div.dataset.group = e[4];
  div.dataset.period = e[5];
  div.style.gridColumnStart = e[4];
  div.style.gridRowStart = e[5];
  div.innerHTML = `
    <div class="num">${e[0]}</div>
    <div class="sym">${e[1]}</div>
    <div class="name">${e[2]}</div>
    <div class="mass">${e[3]}</div>`;
  div.title = `${e[1]} — ${e[2]} (Z=${e[0]})`;
  div.addEventListener("click", () => selectEl(e[0]));
  div.addEventListener("mouseenter", () => highlightRowCol(e[4], e[5], true));
  div.addEventListener("mouseleave", () => highlightRowCol(e[4], e[5], false));
  cellMap[e[0]] = div;
  return div;
}
E.forEach(e => tableEl.appendChild(makeCell(e)));

// Lanthanide / actinide markers in main grid
function marker(group, period, label) {
  const d = document.createElement("div");
  d.className = "el marker";
  d.style.gridColumnStart = group;
  d.style.gridRowStart = period;
  d.textContent = label;
  tableEl.appendChild(d);
}
marker(3, 6, "57-71");
marker(3, 7, "89-103");

// --- Selection / info panel ---
function selectEl(z) {
  if (selected && cellMap[selected]) cellMap[selected].classList.remove("selected");
  selected = z;
  if (cellMap[z]) cellMap[z].classList.add("selected");
  renderInfo(byZ[z]);
}

function fmtK(k) { return (k == null) ? "—" : `${k} K (${(k - 273.15).toFixed(1)} °C)`; }
function fmtYear(y) {
  if (y === 0) return "Prehistoric / ancient";
  if (y < 0) return `${-y} BCE`;
  return String(y);
}

function renderInfo(e) {
  if (!e) {
    infoEl.innerHTML = "<i>Click an element to see its properties.</i>";
    return;
  }
  infoEl.innerHTML = `
    <div class="head">
      <div class="big-sym" style="color:#222">${e[1]}</div>
      <div class="big-name">${e[2]}</div>
      <div class="big-z">Z = ${e[0]}</div>
    </div>
    <dl>
      <dt>Atomic mass</dt><dd>${e[3]} u</dd>
      <dt>Group / Period</dt><dd>${e[4]}, ${e[5] === 8 ? '6 (Lanthanide)' : e[5] === 9 ? '7 (Actinide)' : e[5]}</dd>
      <dt>Category</dt><dd>${CAT_LABEL[e[6]]}</dd>
      <dt>Phase at 25 °C</dt><dd>${e[7]}</dd>
      <dt>Electronegativity</dt><dd>${e[8] == null ? "—" : e[8] + " (Pauling)"}</dd>
      <dt>Melting point</dt><dd>${fmtK(e[9])}</dd>
      <dt>Boiling point</dt><dd>${fmtK(e[10])}</dd>
      <dt>Density</dt><dd>${e[11] == null ? "—" : e[11] + " g/cm³"}</dd>
      <dt>Electron config</dt><dd>${e[12]}</dd>
      <dt>Discovered</dt><dd>${fmtYear(e[13])}${e[14] ? " — " + e[14] : ""}</dd>
    </dl>`;
}
renderInfo(null);

// --- Hover row/column highlight ---
function highlightRowCol(group, period, on) {
  document.querySelectorAll('.el').forEach(c => {
    if (c.classList.contains('marker')) return;
    if (on && (c.dataset.group === String(group) || c.dataset.period === String(period))) {
      c.classList.add(c.dataset.group === String(group) ? "col-hi" : "row-hi");
    } else {
      c.classList.remove("col-hi", "row-hi");
    }
  });
}

// --- Color modes ---
function applyMode(mode) {
  document.body.dataset.mode = mode;
  // Reset inline backgrounds first; CSS rules handle category and phase modes.
  document.querySelectorAll('.el').forEach(c => { if (!c.classList.contains('marker')) c.style.background = ''; });
  if (mode === "electroneg") heatmap(8, 0.7, 4.0);
  else if (mode === "melt")   heatmap(9, 13, 3700);
  else if (mode === "boil")   heatmap(10, 4, 6500);
  updateLegend();
}
function heatmap(idx, lo, hi) {
  const grad = ["#2962ff","#00bfa5","#ffd600","#ff6d00","#d50000"];
  E.forEach(e => {
    const v = e[idx];
    const cell = cellMap[e[0]];
    if (!cell) return;
    if (v == null) { cell.style.background = "#dcdcdc"; return; }
    const t = Math.max(0, Math.min(1, (v - lo) / (hi - lo)));
    // Linear interpolate across the 5-stop gradient.
    const seg = Math.min(grad.length - 2, Math.floor(t * (grad.length - 1)));
    const localT = (t * (grad.length - 1)) - seg;
    cell.style.background = mixHex(grad[seg], grad[seg + 1], localT);
  });
}
function mixHex(a, b, t) {
  const pa = [parseInt(a.slice(1,3),16), parseInt(a.slice(3,5),16), parseInt(a.slice(5,7),16)];
  const pb = [parseInt(b.slice(1,3),16), parseInt(b.slice(3,5),16), parseInt(b.slice(5,7),16)];
  const m = pa.map((v,i) => Math.round(v + (pb[i]-v)*t));
  return `rgb(${m.join(',')})`;
}

// --- Legend ---
function updateLegend() {
  const mode = document.body.dataset.mode;
  if (mode === "category") {
    legendEl.innerHTML = "<h3>Categories (click to filter)</h3>";
    const row = document.createElement("div");
    row.className = "lg-row";
    Object.keys(CAT_LABEL).forEach(k => {
      const span = document.createElement("span");
      span.className = "lg" + (activeCat && activeCat !== k ? " off" : "");
      span.innerHTML = `<span class="sw" data-cat="${k}"></span>${CAT_LABEL[k]}`;
      span.addEventListener("click", () => {
        activeCat = (activeCat === k) ? null : k;
        applyFilter();
        updateLegend();
      });
      row.appendChild(span);
    });
    legendEl.appendChild(row);
  } else if (mode === "phase") {
    legendEl.innerHTML = "<h3>State at 25 °C</h3>";
    const row = document.createElement("div");
    row.className = "lg-row";
    [["solid","Solid","#cfd8dc"],["liquid","Liquid","#80d8ff"],["gas","Gas","#ffe082"],["unknown","Unknown","#eee"]].forEach(([k,l,c]) => {
      const s = document.createElement("span");
      s.className = "lg";
      s.innerHTML = `<span class="sw" style="background:${c}"></span>${l}`;
      row.appendChild(s);
    });
    legendEl.appendChild(row);
  } else {
    const titles = { electroneg: "Electronegativity (Pauling, 0.7–4.0)",
                     melt: "Melting point (13 K – 3700 K)",
                     boil: "Boiling point (4 K – 6500 K)" };
    legendEl.innerHTML = `<h3>${titles[mode]}</h3>`;
    const bar = document.createElement("div");
    bar.className = "heat-bar";
    bar.innerHTML = `<span>low</span><span class="heat-grad"></span><span>high</span>`;
    legendEl.appendChild(bar);
  }
}

// --- Filter (legend click in category mode + search) ---
function applyFilter() {
  const q = searchEl.value.trim().toLowerCase();
  E.forEach(e => {
    const cell = cellMap[e[0]];
    let show = true;
    if (activeCat && document.body.dataset.mode === "category") {
      if (e[6] !== activeCat) show = false;
    }
    if (q.length) {
      const hay = `${e[0]} ${e[1].toLowerCase()} ${e[2].toLowerCase()}`;
      if (!hay.includes(q)) show = false;
    }
    cell.classList.toggle("dim", !show);
  });
}

// --- Wire controls ---
modeEl.addEventListener("change", () => {
  if (modeEl.value !== "category") activeCat = null;
  applyMode(modeEl.value);
  applyFilter();
});
searchEl.addEventListener("input", applyFilter);
clearBtn.addEventListener("click", () => {
  searchEl.value = "";
  activeCat = null;
  selectEl(null);
  applyFilter();
  updateLegend();
});

// Init
applyMode("category");
</script>
