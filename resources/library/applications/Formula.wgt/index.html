<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Formula</title>
  <script defer src="https://cdn.jsdelivr.net/npm/mathlive@0.109.1/mathlive.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mathlive@0.109.1/mathlive-static.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mathlive@0.109.1/mathlive-fonts.css">
  <script>
    MathJax = { tex: { inlineMath: [['$','$'],['\\(','\\)']] }, svg: { fontCache: 'none' } };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <style>
    html,body { margin:0; padding:0; width:100%; height:100%; background:#fff; font-family: system-ui, sans-serif; box-sizing:border-box; }
    #root { display:flex; flex-direction:column; height:100%; padding:5px; gap:3px; box-sizing:border-box; }
    math-field, #plainInput { width:100%; min-height:34px; font-size:13px; border:1px solid #bbb; border-radius:3px; padding:3px 6px; box-sizing:border-box; }
    /* Disable MathLive virtual keyboard entirely — we use the custom palette below */
    math-field::part(virtual-keyboard-toggle) { display:none !important; }
    math-field::part(menu-toggle) { display:none !important; }
    #plainInput { font-family: monospace; }
    .row { display:flex; gap:3px; flex-wrap:wrap; }
    .row button { padding:2px 5px; border:1px solid #ccc; background:#f7f7f7; border-radius:3px; cursor:pointer; font-size:11px; min-width:22px; }
    .row button:hover { background:#eee; }
    #insert { background:#2a7; color:#fff; border-color:#2a7; padding:3px 10px; font-weight:bold; }
    #insert:hover { background:#3b8; }
    #preview { flex:1; min-height:30px; padding:3px 6px; border:1px dashed #ddd; border-radius:3px; overflow:auto; display:flex; align-items:center; justify-content:center; font-size:11px; }
    #preview mjx-container { font-size:90% !important; }
    #status { font-size:9px; color:#888; }
    #logBaseRow { display:none; align-items:center; gap:3px; font-size:11px; }
    #logBaseRow input { width:38px; font-size:11px; padding:1px 3px; }
  </style>
</head>
<body>
<div id="root">
  <div id="editorWrap"></div>
  <div class="row" id="palette"></div>
  <div id="logBaseRow">
    <span>log base:</span>
    <input id="logBase" type="text" placeholder="e.g. 2, 10, e">
    <button id="logInsert">Insert log_b(x)</button>
    <button id="logCancel">×</button>
  </div>
  <div id="preview"></div>
  <div class="row">
    <button id="insert" title="Place formula image on the board">Insert ↑</button>
    <button id="clear" title="Clear">Clear</button>
    <span id="status"></span>
  </div>
</div>
<script>
const $ = id => document.getElementById(id);
let editor; let isMathLive = false;

function setupEditor() {
  const wrap = $('editorWrap');
  if (window.MathfieldElement || customElements.get('math-field')) {
    editor = document.createElement('math-field');
    // Disable the virtual keyboard entirely — palette below replaces it
    editor.setAttribute('math-virtual-keyboard-policy', 'manual');
    editor.setAttribute('virtual-keyboard-mode', 'off');
    editor.value = '';
    editor.addEventListener('input', () => render());
    editor.addEventListener('focusin', (e) => {
      // Prevent MathLive from popping the system virtual keyboard
      try { window.mathVirtualKeyboard && window.mathVirtualKeyboard.hide(); } catch (_) {}
    });
    wrap.appendChild(editor);
    isMathLive = true;
    $('status').textContent = '';
  } else {
    editor = document.createElement('input');
    editor.type = 'text';
    editor.id = 'plainInput';
    editor.placeholder = 'Type math: x^2 + sqrt(2)/3';
    editor.value = '';
    editor.addEventListener('input', () => render());
    wrap.appendChild(editor);
    $('status').textContent = 'Plain mode (MathLive offline).';
  }
}

function plainToLatex(s) {
  s = String(s||'').trim();
  s = s.replace(/sqrt\(([^()]*)\)/g, '\\sqrt{$1}');
  s = s.replace(/\^([A-Za-z0-9]+)/g, '^{$1}');
  s = s.replace(/\^\(([^()]*)\)/g, '^{$1}');
  s = s.replace(/(\b[\w\.]+)\/(\b[\w\.]+\b)/g, '\\frac{$1}{$2}');
  const greek = { pi:'\\pi', theta:'\\theta', alpha:'\\alpha', beta:'\\beta', infty:'\\infty' };
  for (const [k,v] of Object.entries(greek)) s = s.replace(new RegExp('\\b'+k+'\\b','g'), v);
  return s;
}

function getLatex() {
  if (isMathLive) return editor.value || '';
  return plainToLatex(editor.value || '');
}

function render() {
  const tex = getLatex();
  const target = $('preview');
  if (!tex.trim()) { target.innerHTML = ''; return; }
  target.innerHTML = '$$' + tex + '$$';
  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([target]).catch(() => { target.textContent = tex; });
  } else {
    target.textContent = tex;
  }
}

function insertLatex(snippet) {
  if (isMathLive && editor.executeCommand) {
    editor.executeCommand(['insert', snippet]);
    editor.focus();
  } else {
    const start = editor.selectionStart || editor.value.length;
    const plain = snippet
      .replace(/\\frac\{#\?\}\{#\?\}/, ' / ')
      .replace(/\\sqrt\{#\?\}/, 'sqrt()')
      .replace(/#\?/g, '');
    editor.value = editor.value.slice(0, start) + plain + editor.value.slice(start);
    editor.focus();
  }
  render();
}

const buttons = [
  ['x²','^{#?}'], ['√','\\sqrt{#?}'], ['a⁄b','\\frac{#?}{#?}'],
  ['π','\\pi'], ['θ','\\theta'], ['∞','\\infty'],
  ['≤','\\leq'], ['≥','\\geq'], ['≠','\\neq'], ['±','\\pm'],
  ['Σ','\\sum_{#?}^{#?}'], ['∫','\\int_{#?}^{#?}'],
  ['sin','\\sin(#?)'], ['cos','\\cos(#?)'], ['tan','\\tan(#?)'],
  ['log','\\log(#?)'], ['log_b','__LOGB__'], ['ln','\\ln(#?)']
];
const pal = $('palette');
for (const [lbl, val] of buttons) {
  const b = document.createElement('button');
  b.textContent = lbl;
  b.addEventListener('click', () => {
    if (val === '__LOGB__') {
      $('logBaseRow').style.display = 'flex';
      $('logBase').focus();
    } else {
      insertLatex(val);
    }
  });
  pal.appendChild(b);
}

$('logInsert').addEventListener('click', () => {
  const base = ($('logBase').value || '').trim();
  if (!base) { $('logBase').focus(); return; }
  insertLatex('\\log_{' + base + '}(#?)');
  $('logBaseRow').style.display = 'none';
  $('logBase').value = '';
});
$('logCancel').addEventListener('click', () => {
  $('logBaseRow').style.display = 'none';
  $('logBase').value = '';
});

$('clear').addEventListener('click', () => {
  if (isMathLive) editor.value = ''; else editor.value = '';
  render();
});

// Insert button: render preview SVG → PNG data URL → place on board via sankore.addObject
function dataUrlFromSvg(svgEl) {
  return new Promise((resolve, reject) => {
    const xml = new XMLSerializer().serializeToString(svgEl);
    const svgBlob = new Blob([xml], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(svgBlob);
    const img = new Image();
    img.onload = () => {
      const scale = 4;
      const cv = document.createElement('canvas');
      cv.width = Math.max(1, img.width * scale);
      cv.height = Math.max(1, img.height * scale);
      const ctx = cv.getContext('2d');
      ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, cv.width, cv.height);
      ctx.drawImage(img, 0, 0, cv.width, cv.height);
      URL.revokeObjectURL(url);
      resolve(cv.toDataURL('image/png'));
    };
    img.onerror = (e) => { URL.revokeObjectURL(url); reject(e); };
    img.src = url;
  });
}

$('insert').addEventListener('click', async () => {
  const target = $('preview');
  const svg = target.querySelector('svg');
  if (!svg) {
    $('status').textContent = 'Type a formula first.';
    setTimeout(() => $('status').textContent = '', 2000);
    return;
  }
  try {
    const pngDataUrl = await dataUrlFromSvg(svg);
    if (window.sankore && window.sankore.addObject) {
      window.sankore.addObject(pngDataUrl, 0, 0, 0, 0, false);
      $('status').textContent = 'Inserted on board.';
    } else {
      // Fallback: open in new tab so user can drag onto the board
      const w = window.open('', '_blank');
      if (w) {
        w.document.write('<title>Formula</title><body style="margin:0;background:#222;display:flex;align-items:center;justify-content:center;min-height:100vh;"><img style="background:#fff;padding:10px;" src="' + pngDataUrl + '"></body>');
        $('status').textContent = 'Opened in new tab.';
      } else {
        $('status').textContent = 'Insert API unavailable.';
      }
    }
    setTimeout(() => $('status').textContent = '', 2500);
  } catch (e) {
    $('status').textContent = 'Render failed.';
  }
});

window.addEventListener('load', () => {
  setupEditor();
  // Hide system virtual keyboard if MathLive tries to show it
  try {
    if (window.mathVirtualKeyboard) {
      window.mathVirtualKeyboard.hide();
    }
  } catch (_) {}
});
</script>
</body>
</html>
